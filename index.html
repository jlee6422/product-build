<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Web Project</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">MyProject</div>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Welcome to My Project</h1>
        <p>A clean starting point for web development.</p>
        <button id="cta-btn">Get Started</button>
      </section>

      <section class="rates-section">
        <div class="rates-container">
          <div class="rates-header">
            <h2>Market Rates</h2>
            <span class="rates-updated" id="rates-updated">Loading...</span>
          </div>

          <div class="rates-tabs">
            <button class="tab-btn active" data-tab="forex">Forex</button>
            <button class="tab-btn" data-tab="crypto">Crypto</button>
          </div>

          <div class="tab-panel active" id="tab-forex">
            <p class="rates-base">Base: <strong>USD</strong></p>
            <div class="rates-grid" id="forex-grid">
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
            </div>
          </div>

          <div class="tab-panel" id="tab-crypto">
            <p class="rates-base">Price in <strong>USD</strong></p>
            <div class="rates-grid" id="crypto-grid">
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
              <div class="rate-card skeleton"></div>
            </div>
          </div>

          <p class="rates-error hidden" id="rates-error">Failed to load rates. Please try again later.</p>
          <p class="rates-source">Data via <a href="https://exchangerate.host" target="_blank" rel="noopener">exchangerate.host</a></p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 MyProject. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
